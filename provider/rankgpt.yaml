provider: rankgpt
label:
  en_US: RankGPT
description:
  en_US: LLM-based reranker supporting OpenAI, Google Gemini, and Anthropic (RankGPT style).
  zh_Hans: 支持 OpenAI、Google Gemini 和 Anthropic 的 LLM 重排模型（RankGPT 风格）。
  ja_JP: OpenAI、Google Gemini、Anthropic をサポートする LLM リランキングモデル（RankGPT 方式）。
icon_small:
  en_US: icon.svg
icon_large:
  en_US: icon.svg
background: "#E5E7EB"
supported_model_types:
  - rerank
configurate_methods:
  - customizable-model
model_credential_schema:
  model:
    label:
      en_US: Model Name
      zh_Hans: 模型名称
      ja_JP: モデル名
    placeholder:
      en_US: "e.g. gpt-4o-mini, gemini-2.0-flash, or claude-sonnet-4-20250514"
      zh_Hans: "例如 gpt-4o-mini、gemini-2.0-flash 或 claude-sonnet-4-20250514"
      ja_JP: "例：gpt-4o-mini、gemini-2.0-flash、または claude-sonnet-4-20250514"
  credential_form_schemas:
    - variable: provider
      label:
        en_US: Provider
        zh_Hans: 服务商
        ja_JP: プロバイダー
      type: select
      required: true
      default: openai
      options:
        - value: openai
          label:
            en_US: OpenAI
            zh_Hans: OpenAI
            ja_JP: OpenAI
        - value: gemini
          label:
            en_US: Google Gemini
            zh_Hans: Google Gemini
            ja_JP: Google Gemini
        - value: anthropic
          label:
            en_US: Anthropic
            zh_Hans: Anthropic
            ja_JP: Anthropic
    - variable: openai_api_key
      label:
        en_US: OpenAI API Key
        zh_Hans: OpenAI API Key
        ja_JP: OpenAI API キー
      type: secret-input
      required: false
      show_on:
        - variable: provider
          value: openai
      placeholder:
        en_US: Enter your OpenAI API Key
        zh_Hans: 在此输入 OpenAI API Key
        ja_JP: OpenAI API キーを入力
    - variable: openai_base_url
      label:
        en_US: Base URL (optional)
        zh_Hans: Base URL（可选）
        ja_JP: ベース URL（省略可）
      type: text-input
      required: false
      show_on:
        - variable: provider
          value: openai
      placeholder:
        en_US: https://api.openai.com/v1
    - variable: gemini_api_key
      label:
        en_US: Gemini API Key
        zh_Hans: Gemini API Key
        ja_JP: Gemini API キー
      type: secret-input
      required: false
      show_on:
        - variable: provider
          value: gemini
      placeholder:
        en_US: Enter your Google AI Studio API Key
        zh_Hans: 在此输入 Google AI Studio API Key
        ja_JP: Google AI Studio API キーを入力
    - variable: anthropic_api_key
      label:
        en_US: Anthropic API Key
        zh_Hans: Anthropic API Key
        ja_JP: Anthropic API キー
      type: secret-input
      required: false
      show_on:
        - variable: provider
          value: anthropic
      placeholder:
        en_US: Enter your Anthropic API Key
        zh_Hans: 在此输入 Anthropic API Key
        ja_JP: Anthropic API キーを入力
    - variable: window_size
      label:
        en_US: Sliding window size
        zh_Hans: 滑动窗口大小
        ja_JP: スライドウィンドウサイズ
      required: false
      show_on:
        - variable: __model_type
          value: rerank
      type: text-input
      default: "20"
      placeholder:
        en_US: Enter rerank window size
    - variable: step_size
      label:
        en_US: Sliding step size
        zh_Hans: 滑动步长
        ja_JP: スライドステップサイズ
      required: false
      show_on:
        - variable: __model_type
          value: rerank
      type: text-input
      default: "10"
      placeholder:
        en_US: Enter rerank step size
    - variable: max_doc_words
      label:
        en_US: Max words per doc
        zh_Hans: 单文档最大词数
        ja_JP: ドキュメントあたりの最大単語数
      required: false
      show_on:
        - variable: __model_type
          value: rerank
      type: text-input
      default: "300"
      placeholder:
        en_US: Truncate each passage before reranking
extra:
  python:
    provider_source: provider/rankgpt.py
    model_sources:
      - models/rerank/rerank.py
